<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recomendador de Películas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>Películas</h1>
      </div>
      <button id="btnGenero" onclick="toggleGenero()">♀ Mujer</button>
    </div>
  </header>

  <main>
    <section class="filtros">
      <label for="genero">Género:</label>
      <select id="genero">
        <option value="">-- Todos --</option>
        <option value="Acción">Acción</option>
        <option value="Comedia">Comedia</option>
        <option value="Drama">Drama</option>
        <option value="Terror">Terror</option>
        <option value="Ciencia Ficción">Ciencia Ficción</option>
        <option value="Animación">Animación</option>
      </select>

      <label for="anio">Año mínimo:</label>
      <input type="number" id="anio" placeholder="Ej: 2000" min="1900" max="2024" />

      <label for="calificacion">Calificación mínima:</label>
      <input type="number" id="calificacion" placeholder="1-10" min="1" max="10" step="0.1" />

      <button onclick="recomendar()">Buscar</button>
      <button onclick="verGeneros()">Ver Generos</button>
    </section>

    <section id="resultados" class="resultados"></section>
  </main>

  <script src="peli.js"></script>
</body>
</html>
